<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Lista de Compras Inteligente</title>
</head>

<body>

    <div id="wrapper">

        <header id="header">

            <section id="header-left">
                <div class="tool-bar">
                    <img src="./assets/menu.png" alt="tool bar">
                </div>
                <h2 class="text-tool-bar">Shopping List</h2>
            </section>

            <section id="header-right">
                <div class="profile">
                    <img src="./assets/man-with-short-hair-profile-avatar.png" alt="image profile"
                        class="profile-image">
                </div>
            </section>

        </header>

        <main id="main">

            <h1 class="title">Lista de Compras Inteligente</h1>
            <p class="subtitle">Organize seus itens por categoria e acompanhe o que já foi comprado.</p>

            <section id="cards">
                <div class="card">
                    <h4 class="card-title">Total de itens</h4>
                    <p class="card-number total-items">0</p>
                </div>

                <div class="card">
                    <h4 class="card-title">Total de unidades</h4>
                    <p class="card-number total-units">0</p>
                </div>

                <div class="card">
                    <h4 class="card-title-green">Itens comprados</h4>
                    <p class="purchased-items">0</p>
                </div>

                <div class="card">
                    <h4 class="card-title">Itens pendentes</h4>
                    <p class="card-number pending-items">0</p>
                </div>
            </section>

            <section id="container">

                <section id="container-left">
                    <h3>Novo Item</h3>

                    <div class="items-name">
                        <p class="description">Nome do Item</p>
                        <input type="text" placeholder="Ex: Arroz" required class="input-items-name">
                    </div>

                    <div class="inputs-specify-item">
                        <div class="amount">
                            <p class="description">Quantidade</p>
                            <input type="number" placeholder='0' class="input-amount">
                        </div>

                        <div class="category">
                            <p class="description">Categoria</p>
                            <select name="alimentos" id="select">
                                <option value="Alimentos">Alimentos</option>
                                <option value="Limpeza">Limpeza</option>
                                <option value="Higiene">Higiene</option>
                                <option value="Bebidas">Bebidas</option>
                                <option value="Outros">Outros</option>
                            </select>
                        </div>
                    </div>

                    <div class="add-items">
                        <button class="button-add-items" type="button">Adicionar item</button>
                    </div>
                </section>

                <section id="container-right">
                    <div class="filters">
                        <div class="filters-left">
                            <button type="button" class="all-purchases active">Todas</button>
                            <button type="button" class="foods">Alimentos</button>
                            <button type="button" class="cleaning">Limpeza</button>
                            <button type="button" class="hygiene">Higiene</button>
                        </div>

                        <div class="filters-right">
                            <button type="button" class="all-filter-button active-button-filter-right">Todos</button>
                            <button type="button" class="all-pending-button">Pendentes</button>
                        </div>
                    </div>

                    <div class="items"></div>
                </section>
            </section>
        </main>
    </div>
    <script src="./script.js"></script>

</body>

</html>
